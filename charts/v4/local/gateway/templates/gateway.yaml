apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: {{ .Values.gateway.gatewayClassName }}
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Values.gateway.namespace }}
  labels:
    plt.dev/managed-by: platformatic
spec:
  gatewayClassName: {{ .Values.gateway.gatewayClassName }}
  listeners:
    - name: https
      protocol: HTTPS
      port: {{ .Values.gateway.listeners.https.port }}
      tls:
        mode: Terminate
        certificateRefs:
          - name: {{ .Values.gateway.listeners.https.certificateRef }}
            namespace: {{ .Values.gateway.namespace }}
      allowedRoutes:
        namespaces:
          from: Same
    - name: http
      protocol: HTTP
      port: {{ .Values.gateway.listeners.http.port }}
      allowedRoutes:
        namespaces:
          from: Same
---
# Workflow runs can take minutes (AI generation, webhooks, sleep steps).
# Raise the default Envoy request timeout from 15s to 5 minutes.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: extended-timeout
  namespace: {{ .Values.gateway.namespace }}
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: {{ .Values.gateway.name }}
  timeout:
    http:
      connectionIdleTimeout: 600s
      maxConnectionDuration: 600s
      requestTimeout: 300s
    tcp:
      connectTimeout: 10s
